## NetBird — Kubernetes Ingress Manifest (via k3d/k3s + nginx + cert-manager)
##
## Arsitektur:
##   Docker host menjalankan NetBird containers (management, signal, dashboard, coturn)
##   k3d nginx ingress mem-proxy request dari luar ke host via Endpoint manual
##
## Port mapping Docker host:
##   8088 → dashboard (HTTP)
##   8091 → management (HTTP/2 + gRPC, container port 80)
##   10000 → signal (HTTP)
##   3478 → coturn STUN/TURN (UDP, network_mode: host — tidak perlu ingress)
##
## Cara apply:
##   HOST_GW=$(ip route | awk '/docker0/{print $9; exit}')
##   sed "s/HOST_GATEWAY_IP/$HOST_GW/g" k8s/netbird/netbird-ingress.yaml \
##     | sed "s/SPLP_DOMAIN/dev-indonesia.com/g" \
##     | kubectl apply -f -
##
## Atau jalankan: bash scripts/08-setup-netbird-peer.sh --apply-ingress
##
## CATATAN PENTING:
##   - Management gRPC (netbird-mgmt-grpc.SPLP_DOMAIN) → backend port 8091
##     dengan backend-protocol: GRPC agar nginx forward sebagai HTTP/2
##   - Management HTTP REST (netbird-mgmt.SPLP_DOMAIN) → backend port 8091
##     dengan backend-protocol: GRPC (sama, karena port 80 container
##     melayani gRPC + HTTP REST di protokol yang sama)
##   - Port 33073 adalah "gRPC backward compatibility" untuk client lama (<0.28)
##     JANGAN dipakai sebagai management URL untuk client versi baru (0.29+)
##   - Signal server TIDAK perlu TLS di ingress karena NetBird client
##     connect ke signal via plain HTTP (URI di management.json pakai "http")

## ============================================================
## 1. NETBIRD DASHBOARD
## ============================================================

---
## Endpoint manual → host Docker gateway port 8088
apiVersion: v1
kind: Endpoints
metadata:
  name: netbird-dashboard
  namespace: monitoring
subsets:
  - addresses:
      - ip: HOST_GATEWAY_IP
    ports:
      - port: 8088
        protocol: TCP
---
## Service tanpa selector (menggunakan Endpoint di atas)
apiVersion: v1
kind: Service
metadata:
  name: netbird-dashboard
  namespace: monitoring
spec:
  ports:
    - port: 80
      targetPort: 8088
      protocol: TCP
---
## Ingress dashboard dengan TLS cert-manager
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-dashboard
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - netbird.SPLP_DOMAIN
      secretName: tls-netbird-SPLP_DOMAIN
  rules:
    - host: netbird.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-dashboard
                port:
                  number: 80

## ============================================================
## 2. NETBIRD SIGNAL SERVER
## ============================================================

---
## Endpoint manual → host Docker gateway port 10000
apiVersion: v1
kind: Endpoints
metadata:
  name: netbird-signal
  namespace: monitoring
subsets:
  - addresses:
      - ip: HOST_GATEWAY_IP
    ports:
      - port: 10000
        protocol: TCP
---
## Service tanpa selector (menggunakan Endpoint di atas)
apiVersion: v1
kind: Service
metadata:
  name: netbird-signal
  namespace: monitoring
spec:
  ports:
    - port: 10000
      targetPort: 10000
      protocol: TCP
---
## Ingress signal — plain HTTP (NetBird client connect ke signal via HTTP,
## bukan HTTPS; URI di management.json: "Proto": "http")
## ssl-redirect: false agar tidak redirect ke HTTPS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-signal
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: netbird-signal.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-signal
                port:
                  number: 10000

## ============================================================
## 3. NETBIRD MANAGEMENT — Service & Endpoint (shared)
##    Dipakai oleh kedua ingress di bawah (HTTP REST & gRPC)
## ============================================================

---
## Endpoint manual → host Docker gateway port 8091
## Port 8091 = container port 80 = HTTP/2 multiplexed (gRPC + HTTP REST)
apiVersion: v1
kind: Endpoints
metadata:
  name: netbird-management-http
  namespace: monitoring
subsets:
  - addresses:
      - ip: HOST_GATEWAY_IP
    ports:
      - port: 8091
        protocol: TCP
---
## Service tanpa selector (menggunakan Endpoint di atas)
apiVersion: v1
kind: Service
metadata:
  name: netbird-management-http
  namespace: monitoring
spec:
  ports:
    - port: 8091
      targetPort: 8091
      protocol: TCP

## ============================================================
## 4. NETBIRD MANAGEMENT — Ingress gRPC
##    Dipakai oleh NetBird client (netbird up --management-url)
##    backend-protocol: GRPC → nginx forward sebagai HTTP/2 (h2c)
## ============================================================

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-management-grpc
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - netbird-mgmt-grpc.SPLP_DOMAIN
      secretName: tls-netbird-mgmt-grpc-SPLP_DOMAIN
  rules:
    - host: netbird-mgmt-grpc.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-management-http
                port:
                  number: 8091

## ============================================================
## 5. NETBIRD MANAGEMENT — Ingress HTTP REST API
##    Dipakai oleh dashboard web (NETBIRD_MGMT_API_ENDPOINT)
##    backend-protocol: GRPC tetap diperlukan karena port 8091
##    melayani HTTP/2 (nginx harus connect sebagai h2c)
## ============================================================

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-management
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - netbird-mgmt.SPLP_DOMAIN
      secretName: tls-netbird-mgmt-SPLP_DOMAIN
  rules:
    - host: netbird-mgmt.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-management-http
                port:
                  number: 8091