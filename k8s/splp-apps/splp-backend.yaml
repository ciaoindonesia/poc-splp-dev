apiVersion: apps/v1
kind: Deployment
metadata:
  name: splp-backend
  namespace: splp
  labels:
    app: splp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splp-backend
  template:
    metadata:
      labels:
        app: splp-backend
    spec:
      containers:
        - name: splp-backend
          image: splp-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: "production"
            - name: WSO2_APIM_URL
              value: "https://wso2-apim.wso2.svc.cluster.local:9443"
            - name: WSO2_IS_URL
              value: "https://wso2-is.wso2.svc.cluster.local:9444"
            - name: WSO2_CLIENT_ID
              value: "IH2mMW0_N4LQ6gjlXQsNJsFk_rYa"
            - name: WSO2_CLIENT_SECRET
              value: "j7nAfZYZyKbZ8Q45_Pi5fooQQCylWnq_NfFYhfGkm0wa"
            - name: APIM_CLIENT_ID
              value: "B9fqPOPPRc0B1XTwdbKwCDp6drUa"
            - name: APIM_CLIENT_SECRET
              value: "sjunTt1jFEzHJJALMvqGQGEPMJEa"
            - name: CLICKHOUSE_URL
              value: "http://clickhouse.splp.svc.cluster.local:8123"
            - name: CLICKHOUSE_USER
              value: "splp_user"
            - name: CLICKHOUSE_PASSWORD
              value: "splp_pass_2026"
            - name: GRAFANA_URL
              value: "http://grafana.monitoring.svc.cluster.local:80"
            - name: KAFKA_HOST
              value: "splp-kafka-kafka-bootstrap.messaging.svc.cluster.local"
            - name: KAFKA_PORT
              value: "9092"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: splp-backend
  namespace: splp
spec:
  type: NodePort
  selector:
    app: splp-backend
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30802
