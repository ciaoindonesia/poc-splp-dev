apiVersion: apps/v1
kind: Deployment
metadata:
  name: splp-portal
  namespace: splp
  labels:
    app: splp-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splp-portal
  template:
    metadata:
      labels:
        app: splp-portal
    spec:
      containers:
        - name: splp-portal
          image: splp-portal:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: splp-portal
  namespace: splp
spec:
  type: NodePort
  selector:
    app: splp-portal
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30801
