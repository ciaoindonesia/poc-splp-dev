## WSO2 API Manager 4.7.0 - POC Deployment (All-in-One)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-apim
  namespace: wso2
  labels:
    app: wso2-apim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wso2-apim
  template:
    metadata:
      labels:
        app: wso2-apim
    spec:
      containers:
        - name: wso2-apim
          image: wso2/wso2am:4.7.0-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              CONF=/home/wso2carbon/wso2am-4.7.0/repository/conf/deployment.toml
              sed -i "s|hostname = \"localhost\"|hostname = \"$(APIM_HOSTNAME)\"|g" "$CONF"
              sed -i "s|service_url = \"https://localhost:9443/services/\"|service_url = \"https://$(APIM_HOSTNAME)/services/\"|g" "$CONF"
              grep -q '\[transport\.https\.properties\]' "$CONF" \
                && sed -i 's|proxyPort = .*|proxyPort = 443|g' "$CONF" \
                || printf '\n[transport.https.properties]\nproxyPort = 443\n' >> "$CONF"
              exec /home/wso2carbon/docker-entrypoint.sh
          env:
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx2g"
            - name: APIM_HOSTNAME
              value: "apim.SPLP_DOMAIN"
          ports:
            - containerPort: 9443
              name: https
            - containerPort: 9763
              name: http
            - containerPort: 8243
              name: gateway-https
            - containerPort: 8280
              name: gateway-http
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 3Gi
          readinessProbe:
            tcpSocket:
              port: 9443
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 8
          livenessProbe:
            tcpSocket:
              port: 9443
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wso2-apim-config
  namespace: wso2
data:
  deployment.toml: |
    [server]
    hostname = "apim.SPLP_DOMAIN"
    node_ip = "$env{NODE_IP}"
    server_role = "default"
    offset = 0

    [super_admin]
    username = "admin"
    password = "admin"
    create_admin_account = true

    [user_store]
    type = "database_unique_id"

    [database.apim_db]
    type = "h2"
    url = "jdbc:h2:./repository/database/WSO2AM_DB;AUTO_SERVER=TRUE"
    username = "wso2carbon"
    password = "wso2carbon"

    [database.shared_db]
    type = "h2"
    url = "jdbc:h2:./repository/database/WSO2SHARED_DB;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE"
    username = "wso2carbon"
    password = "wso2carbon"

    [keystore.tls]
    file_name = "wso2carbon.jks"
    type = "JKS"
    password = "wso2carbon"
    alias = "wso2carbon"
    key_password = "wso2carbon"

    [truststore]
    file_name = "client-truststore.jks"
    type = "JKS"
    password = "wso2carbon"

    [[apim.gateway.environment]]
    name = "Default"
    type = "hybrid"
    display_in_api_console = true
    description = "SPLP Gateway Environment"
    show_as_token_endpoint_url = true
    service_url = "https://apim.SPLP_DOMAIN/services/"
    ws_endpoint = "ws://api.SPLP_DOMAIN:9099"
    wss_endpoint = "wss://api.SPLP_DOMAIN:8099"
    http_endpoint = "http://api.SPLP_DOMAIN"
    https_endpoint = "https://api.SPLP_DOMAIN"

    [apim.cors]
    allow_origins = "*"
    allow_methods = ["GET","PUT","POST","DELETE","PATCH","OPTIONS"]
    allow_headers = ["authorization","Access-Control-Allow-Origin","Content-Type","SOAPAction","apikey","Internal-Key"]
    allow_credentials = false

    [transport.https.properties]
    proxyPort = 443
---
apiVersion: v1
kind: Service
metadata:
  name: wso2-apim
  namespace: wso2
  labels:
    app: wso2-apim
spec:
  type: NodePort
  selector:
    app: wso2-apim
  ports:
    - port: 9443
      targetPort: 9443
      nodePort: 30943
      name: https
    - port: 9763
      targetPort: 9763
      name: http
    - port: 8280
      targetPort: 8280
      nodePort: 30280
      name: gateway-http
    - port: 8243
      targetPort: 8243
      name: gateway-https
