## SPLP Ingress Resources — SPLP_DOMAIN
## Requires nginx-ingress-controller + cert-manager (for TLS)
## /etc/hosts: 127.0.0.1 SPLP_DOMAIN api.SPLP_DOMAIN apim.SPLP_DOMAIN is.SPLP_DOMAIN grafana.SPLP_DOMAIN clickhouse.SPLP_DOMAIN

---
## SPLP Portal
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: splp-portal
  namespace: splp
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - SPLP_DOMAIN
        - portal.SPLP_DOMAIN
      secretName: tls-portal-SPLP_DOMAIN
  rules:
    - host: SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: splp-portal
                port:
                  number: 80
    - host: portal.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: splp-portal
                port:
                  number: 80
---
## SPLP Backend API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: splp-backend
  namespace: splp
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api-backend.SPLP_DOMAIN
      secretName: tls-api-backend-SPLP_DOMAIN
  rules:
    - host: api-backend.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: splp-backend
                port:
                  number: 3002
---
## WSO2 API Manager — Carbon Console + Gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wso2-apim
  namespace: wso2
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - apim.SPLP_DOMAIN
      secretName: tls-apim-SPLP_DOMAIN
  rules:
    - host: apim.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wso2-apim
                port:
                  number: 9443
    - host: api.SPLP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wso2-apim
                port:
                  number: 8243
---
