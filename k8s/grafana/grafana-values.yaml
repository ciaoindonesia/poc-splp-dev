## Grafana Helm Values for SPLP POC
adminUser: admin
adminPassword: splp-grafana-2026

service:
  type: NodePort
  nodePort: 30300

persistence:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

grafana.ini:
  server:
    domain: grafana.SPLP_DOMAIN
    root_url: "%(protocol)s://%(domain)s"
  auth.anonymous:
    enabled: true
    org_id: 1
    org_role: Viewer
    hide_version: false
  security:
    allow_embedding: true
    cookie_samesite: none
    cookie_secure: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        uid: clickhouse-splp
        url: http://clickhouse.splp.svc.cluster.local:8123
        jsonData:
          defaultDatabase: splp
          username: splp_user
          dialTimeout: 10
          httpConnectionTimeout: 30
        secureJsonData:
          password: splp_pass_2026
        isDefault: true
      - name: Prometheus
        type: prometheus
        uid: prometheus-splp
        url: http://prometheus-server.monitoring.svc.cluster.local:80
        isDefault: false
        jsonData:
          timeInterval: 30s
      - name: Loki
        type: loki
        uid: loki-splp
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

plugins:
  - grafana-clickhouse-datasource

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: splp-dashboards
        orgId: 1
        folder: SPLP
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/splp

dashboards:
  splp:
    ## Node Exporter Full — CPU, Memory, Disk, Network per node
    node-exporter:
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    ## Kubernetes Cluster Overview — pods, deployments, resource usage
    k8s-cluster:
      gnetId: 7249
      revision: 1
      datasource: Prometheus
    ## Loki — Log volume & search
    loki-logs:
      gnetId: 13639
      revision: 2
      datasource: Loki
