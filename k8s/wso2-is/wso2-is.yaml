## WSO2 Identity Server 7.3.0 - POC Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-is
  namespace: wso2
  labels:
    app: wso2-is
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wso2-is
  template:
    metadata:
      labels:
        app: wso2-is
    spec:
      containers:
        - name: wso2-is
          image: wso2/wso2is:7.3.0-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1500m"
            - name: WSO2_SERVER_ADMIN_USERNAME
              value: "admin"
            - name: WSO2_SERVER_ADMIN_PASSWORD
              value: "admin"
          ports:
            - containerPort: 9443
              name: https
            - containerPort: 9763
              name: http
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 9443
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 8
          livenessProbe:
            tcpSocket:
              port: 9443
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wso2-is-config
  namespace: wso2
data:
  deployment.toml: |
    [server]
    hostname = "localhost"
    node_ip = "$env{NODE_IP}"
    offset = 1

    [transport.https.properties]
    proxyPort = 443

    [super_admin]
    username = "admin"
    password = "admin"
    create_admin_account = true

    [user_store]
    type = "database_unique_id"

    [database.identity_db]
    type = "h2"
    url = "jdbc:h2:./repository/database/WSO2IDENTITY_DB;AUTO_SERVER=TRUE"
    username = "wso2carbon"
    password = "wso2carbon"

    [database.shared_db]
    type = "h2"
    url = "jdbc:h2:./repository/database/WSO2SHARED_DB;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE"
    username = "wso2carbon"
    password = "wso2carbon"

    [keystore.primary]
    file_name = "wso2carbon.jks"
    password = "wso2carbon"

    [[oauth.custom_response_type]]
    name = "token"

    [oauth.oidc]
    id_token.issuer = "https://localhost:9444/oauth2/token"

    [cors]
    allow_generic_http_requests = true
    allow_any_origin = true
    allow_subdomains = false
    supported_methods = ["GET", "POST", "DELETE", "PUT", "PATCH", "OPTIONS", "HEAD"]
    allow_headers = ["Authorization", "Content-Type", "X-JWT-Assertion", "Origin"]
    expose_headers = ["Content-Type", "X-JWT-Assertion"]
    supports_credentials = true
    max_age = 3600
---
apiVersion: v1
kind: Service
metadata:
  name: wso2-is
  namespace: wso2
  labels:
    app: wso2-is
spec:
  type: NodePort
  selector:
    app: wso2-is
  ports:
    - port: 9444
      targetPort: 9443
      nodePort: 30944
      name: https
    - port: 9766
      targetPort: 9763
      name: http
