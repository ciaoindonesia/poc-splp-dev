apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: splp
  labels:
    app: clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: splp
            - name: CLICKHOUSE_USER
              value: splp_user
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            - name: CLICKHOUSE_PASSWORD
              value: splp_pass_2026
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: clickhouse-data
          persistentVolumeClaim:
            claimName: clickhouse-pvc
        - name: clickhouse-init
          configMap:
            name: clickhouse-init-sql
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-pvc
  namespace: splp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init-sql
  namespace: splp
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS splp;
    
    CREATE TABLE IF NOT EXISTS splp.api_access_logs (
      id UUID DEFAULT generateUUIDv4(),
      timestamp DateTime DEFAULT now(),
      api_name String,
      api_version String,
      agency_source String,
      agency_target String,
      method String,
      endpoint String,
      status_code UInt16,
      response_time_ms UInt32,
      request_size_bytes UInt32,
      response_size_bytes UInt32,
      user_id String,
      transaction_id String,
      error_message String DEFAULT ''
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (timestamp, agency_source, api_name)
    TTL timestamp + INTERVAL 90 DAY;

    CREATE TABLE IF NOT EXISTS splp.kafka_messages (
      id UUID DEFAULT generateUUIDv4(),
      timestamp DateTime DEFAULT now(),
      topic String,
      partition UInt32,
      offset UInt64,
      agency_source String,
      agency_target String,
      message_type String,
      payload_size_bytes UInt32,
      processing_time_ms UInt32,
      status String
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (timestamp, topic)
    TTL timestamp + INTERVAL 30 DAY;

    CREATE TABLE IF NOT EXISTS splp.exchange_summary_daily (
      date Date DEFAULT today(),
      agency_source String,
      agency_target String,
      api_name String,
      total_requests UInt64,
      success_requests UInt64,
      failed_requests UInt64,
      avg_response_time_ms Float32,
      total_data_transferred_bytes UInt64
    ) ENGINE = SummingMergeTree()
    PARTITION BY toYYYYMM(date)
    ORDER BY (date, agency_source, agency_target, api_name);

    INSERT INTO splp.api_access_logs 
      (timestamp, api_name, api_version, agency_source, agency_target, method, endpoint, status_code, response_time_ms, request_size_bytes, response_size_bytes, user_id, transaction_id)
    SELECT
      now() - toIntervalSecond(rand() % 86400) as timestamp,
      ['Verifikasi NIK', 'Data Kependudukan', 'Status BPJS', 'Verifikasi NPWP', 'Data Bansos', 'Verifikasi Ijazah', 'Status Perizinan', 'Data Nikah'][rand() % 8 + 1] as api_name,
      'v1.0' as api_version,
      ['Kemensos', 'DJP', 'BPJS Kesehatan', 'Kemendikbud', 'Kemenhub', 'Kemenaker', 'POLRI', 'KPK'][rand() % 8 + 1] as agency_source,
      ['Dukcapil', 'Kemendagri', 'BPJS Ketenagakerjaan', 'DJP', 'Kemensos', 'Kemenkes'][rand() % 6 + 1] as agency_target,
      ['GET', 'POST', 'GET', 'POST'][rand() % 4 + 1] as method,
      '/api/v1/data-exchange' as endpoint,
      [200, 200, 200, 200, 201, 400, 404, 500][rand() % 8 + 1] as status_code,
      50 + rand() % 500 as response_time_ms,
      100 + rand() % 1000 as request_size_bytes,
      200 + rand() % 2000 as response_size_bytes,
      concat('user_', toString(rand() % 100)) as user_id,
      generateUUIDv4() as transaction_id
    FROM numbers(5000);
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: splp
spec:
  type: NodePort
  selector:
    app: clickhouse
  ports:
    - port: 8123
      targetPort: 8123
      nodePort: 30888
      name: http
    - port: 9000
      targetPort: 9000
      name: native
