## NetBird Self-Hosted Management Server
##
## CARA DEPLOY (pilih salah satu):
##
## [A] Official Quickstart (DIREKOMENDASIKAN) — auto-setup + Zitadel IdP:
##   export NETBIRD_DOMAIN=netbird.dev-indonesia.com
##   curl -fsSL https://github.com/netbirdio/netbird/releases/latest/download/getting-started-with-zitadel.sh | bash
##   → Akses: https://netbird.dev-indonesia.com
##   → Zitadel admin: https://netbird.dev-indonesia.com:8080
##
## [B] NetBird Cloud (tercepat untuk PoC, tanpa self-host):
##   → Daftar gratis di https://app.netbird.io
##   → Gunakan setup key dari dashboard cloud
##   → Semua fitur sama, tunnel tetap P2P
##
## [C] Manual compose di bawah ini (butuh IdP terpisah — tidak direkomendasikan)
##

version: "3"

services:
  # ─── Coturn STUN/TURN server (NAT traversal) ──────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --listening-ip=0.0.0.0
      - --realm=netbird.dev-indonesia.com
      - --fingerprint
      - --lt-cred-mech
      - --user=splp:splp-turn-2026
      - --no-cli

  # ─── NetBird Signal Server ────────────────────────────────────────────────
  signal:
    image: netbirdio/signal:latest
    restart: unless-stopped
    ports:
      - "0.0.0.0:10000:10000"
    volumes:
      - netbird_signal:/var/lib/netbird

  # ─── NetBird Management Server ───────────────────────────────────────────
  management:
    image: netbirdio/management:latest
    restart: unless-stopped
    depends_on:
      - signal
    ports:
      - "33073:33073"
      - "33073:33073/udp"
      - "8091:80"
    volumes:
      - netbird_mgmt:/var/lib/netbird
      - ./management.json:/etc/netbird/management.json
    command:
      - --log-file=console
      - --log-level=info
      - --disable-anonymous-metrics=true
      - --single-account-mode-domain=netbird.dev-indonesia.com

  # ─── NetBird Dashboard (Web UI) ──────────────────────────────────────────
  dashboard:
    image: netbirdio/dashboard:latest
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      - AUTH_AUDIENCE=88ySb5TirNgrz5TFL_SlZ98qjRwa
      - AUTH_CLIENT_ID=88ySb5TirNgrz5TFL_SlZ98qjRwa
      - AUTH_AUTHORITY=https://is.dev-indonesia.com/oauth2/oidcdiscovery
      - AUTH_SUPPORTED_SCOPES=openid profile email
      - AUTH_REDIRECT_URI=/auth
      - AUTH_SILENT_REDIRECT_URI=/silent-auth
      - USE_AUTH0=false
      - NETBIRD_MGMT_API_ENDPOINT=https://netbird-mgmt.dev-indonesia.com
      - NETBIRD_MGMT_GRPC_API_ENDPOINT=https://netbird-mgmt.dev-indonesia.com

volumes:
  netbird_mgmt:
  netbird_signal: